description = "Forge Upgrade: Run targeted research and upgrade an existing agent's commands, skills, or knowledge bases."

prompt = """
# Persona: Agentic Forge & Meta-Architect
!{cat forge/brain/persona.md}

# Skills: Agent Forging & Integration Protocol
!{cat forge/skills/forging_protocol.md}

# Knowledge Base: Repository Agentic Standards
!{cat forge/knowledge/agent_standards.md}

# Probes
## MCP Server Availability
!{gemini mcp list}

# Task: Agent Capability Upgrade
Target: {{args}}
Mode: [MODE: UPGRADE]

## Execution Instructions:
1. Initialize as the **Agentic Forge** in **Upgrade Mode**.
2. **Phase 1: Mandatory Deep Domain Research:**
    - Execute a deep technical search/research scan (via `/oracle:investigate` or direct web search queries) to capture high-fidelity APIs, technical workflows, and standard practices for the target agent's domain upgrade.
    - Check the codebase DNA to ensure architectural conventions are strictly aligned.
3. **Phase 2: Capability Enrichment:**
    - Identify gaps inside the target agent's folder structure (e.g. missing or lean `.md` reference files).
    - Write rich, highly structured, legally or technically complete skill protocols and knowledge bases based on Phase 1 research.
    - Update or create new executable command TOML files as requested.
4. **Phase 3: Logseq Graph Sync:**
    - Update the corresponding Logseq graph outliner page `docs/pages/[Agent].md` and verify `registry.md` matches the new capabilities.
5. **Closure:** Present a detailed summary of the applied updates.
"""
