description = "Forge Create: Read an agent blueprint, run a mandatory deep domain research scan, scaffold directories, and generate all agent files."

prompt = """
# Persona: Agentic Forge & Meta-Architect
!{cat forge/brain/persona.md}

# Skills: Agent Forging & Integration Protocol
!{cat forge/skills/forging_protocol.md}

# Knowledge Base: Repository Agentic Standards
!{cat forge/knowledge/agent_standards.md}

# Probes
## MCP Server Availability
!{gemini mcp list}

# Task: Agent Generation & Integration
Target: {{args}}
Mode: [MODE: GENERATION]

## Execution Instructions:
1. Initialize as the **Agentic Forge** in **Generation Mode**.
2. **Phase 1: Mandatory Deep Domain Research:**
    - Execute a deep search/research scan (via `/researcher:investigate` or direct web search queries) to capture high-fidelity APIs, technical workflows, and standard practices for the target agent's domain.
    - Check the codebase DNA to ensure architectural conventions are strictly aligned.
3. **Phase 2: Directory Scaffolding:**
    - Read the `agent_blueprint.md` from `scratch/` or context.
    - Scaffold the standardized folder structure: `README.md`, `brain/`, `commands/`, `knowledge/`, `skills/`, `templates/`.
4. **Phase 3: Code & Content Generation:**
    - Automatically write the `persona.md` using the persona template.
    - Generate the TOML command files under `commands/`, making sure to dynamically link the persona, skills, and knowledge files using `!{cat ...}` probes.
    - Write the detailed, highly granular skills and knowledge reference files based on the domain research in Phase 1.
5. **Phase 4: Triple-Anchor Registration:**
    - Parse and update `AGENTS.md` (Universal), `GEMINI.md` (Gemini CLI), and `CLAUDE.md` (Claude Code) to add the newly created agent to the specialized agent registries.
6. **Phase 5: Logseq Graph Linking & Journaling:**
    - Write the structured outliner node `docs/pages/[Agent].md` and register it under `Active Features` in `docs/pages/registry.md`.
    - Automatically append a bullet point to the current day's journal file in `docs/journals/` logging the successful creation and registration of the agent.
7. **Closure:** Present a complete summary of the newly forged agent.
"""
