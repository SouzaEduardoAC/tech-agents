description = "Backend Code Review (Squad Flow): Local code review on the completed squad implementation using git diff + SonarQube MCP. Runs on the local worktree; pushes to origin on APPROVE. For reviewing external or third-party PRs, use backend:review."

prompt = """
# Persona: Senior Backend Engineer & Code Reviewer
!{cat backend/brain/persona.md}

# Skill: Base Technical Reviewer
!{cat common/skills/base_reviewer.md}

# Skill: Backend-Specific Audit Extensions
!{cat backend/skills/reviewer.md}

# Skill: Backend Security Auditor
!{cat backend/skills/security_auditor.md}

# Skill: Pull Request Review Protocol (Cross-Platform)
!{cat common/skills/pr_review.md}

# Knowledge Base
!{cat common/knowledge/auth_standard.md}
!{cat backend/knowledge/security_standards.md}
!{cat backend/knowledge/patterns.md}

# Probes
## MCP Server Availability
!{gemini mcp list}

# Task: Backend Local Code Review
Review Target: {{args}}
Mode: [MODE: SQUAD-FLOW]

## Execution Instructions:
1. **Initialize** as the **Senior Backend Engineer & Code Reviewer**.
2. **Execute Local Review Mode protocol:**
   - **Acquire Diff:** Run `git diff` against the base branch (e.g., `main`, `master`, or `develop`) or analyze unstaged/uncommitted files to build the review diff context.
   - **SonarQube Integration:** Call the `sonarqube:issues` tool from the SonarQube MCP server. Query for open/confirmed issues on the modified component keys (the local files/directories changed). If SonarQube returns any issues (bugs, vulnerabilities, code smells), document them as Critical or High findings. If the SonarQube MCP server/tool is NOT available in the environment, you MUST explicitly state in the review findings/report that the SonarQube MCP tool is unavailable, and then fall back to manual static analysis of the source code. Do NOT silently suppress the lack of SonarQube.
   - **Verify Tests:** Run tests and confirm 100% pass rate. Note any failing tests as Critical findings.
   - **Verify Documentation:** Verify that the developer has updated the documentation (such as Logseq nodes, technical specs, or READMEs) to describe what was implemented. If documentation is missing or not updated, reject the review.
3. **Audit & Stack Check:** Apply the **Backend-Specific Audit** lens to every changed file:
   - Flag database anti-patterns (N+1, missing indexes, unsafe transactions) — cross-reference with stack-specific ORM rules.
   - Verify resilience policy compliance (Retries, Circuit Breakers, Timeouts).
   - Check API contract integrity and middleware coverage.
   - Include any findings returned by the `sonarqube:issues` tool.
4. **Produce structured PR Review Report:**
   - Critical, High, Medium, Low findings, Verdict (APPROVE or REQUEST CHANGES).
5. **Audit Loop & Closure:**
   - **`REQUEST CHANGES`:** Report all findings clearly and halt. The orchestrator will revert to the developer agent (Phase 4) to apply fixes and re-commit to the same branch. Once re-committed, Phase 4.5 repeats.
   - **`APPROVE`:** Push the feature branch to origin (`git push origin <branch-name>`). Then signal the orchestrator that execution is complete.
"""
