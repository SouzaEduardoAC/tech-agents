description = "Squad Orchestrator: Unified command to run the full pipeline via the Agent Hub MCP."

prompt = """
# Task: Orchestrate High-Level Project
Goal: {{args}}
Mode: [MODE: SQUAD-ORCHESTRATOR]

# Context Preparation
1. Check the availability of the `agent-hub` MCP server.
2. Call `agent_hub:get_agent_prompt(agent="squad")` to initialize your squad manager persona.
3. Execute the **Pipeline Protocol** below, respecting every MANDATORY HUMAN CHECKPOINT without exception.

## Probes
!{gemini mcp list}

---

## Pipeline Protocol

### PIPELINE INIT — Register Session & Gates
**BEFORE starting Phase 1**, call:
```
agent_hub:pipeline_start(
  goal="{{args}}",
  gates=["prd", "discovery", "plan", "compliance", "execution"]
)
```
This registers the session and locks all gates. You MUST do this before any other pipeline action.

---

### Phase 1 — Product Elicitation (PO)
- Call `agent_hub:call_agent_command(agent="po", command="squad-discovery", args="{{args}}")`.
- Adopt the Product Owner persona, run the requirements discovery protocol to draft the PRD, write it to `docs/pages/{{args}}-prd.md`, and request human sign-off on the 'prd' gate.

---
⚠️ MANDATORY HUMAN CHECKPOINT — PIPELINE PAUSED AFTER PHASE 1
The MCP tool `request_approval` has set gate 'prd' to PENDING.
Present the PRD (`docs/pages/{{args}}-prd.md`) to the user and WAIT for their explicit written approval before calling any further agents.
Do NOT auto-approve. Do NOT proceed autonomously. Do NOT call the Architect.
The pipeline is BLOCKED until the human runs `/squad:approve prd`.
---

### Phase 2 — Architecture & Implementation Plan (Architect)
**FIRST**, verify approval exists by calling:
```
agent_hub:check_gate(gate="prd")
```
If the gate is not approved, STOP IMMEDIATELY and inform the user that `/squad:approve prd` must be run first.

(Proceed ONLY after check_gate returns approved:true for 'prd'.)
- Call `agent_hub:call_agent_command(agent="architect", command="squad-plan", args="{{args}}")`.
- Adopt the Architect persona. The Architect will run in two sub-phases:
  - **Sub-Phase 2a (Discovery/Analysis):** Produces `docs/pages/{{args}}-analysis.md` and requests approval on the 'discovery' gate. The pipeline halts here.
  - **Sub-Phase 2b (Architecture/ADR):** After the 'discovery' gate is approved, produces `docs/pages/{{args}}-architecture.md` and requests approval on the 'plan' gate. The pipeline halts again.

---
⚠️ MANDATORY HUMAN CHECKPOINT — PIPELINE PAUSED AFTER PHASE 2a (Discovery)
The MCP tool `request_approval` has set gate 'discovery' to PENDING.
Present the Technical Analysis (`docs/pages/{{args}}-analysis.md`) to the user and WAIT for their explicit written approval before the Architect continues to write the ADR.
Do NOT auto-approve. Do NOT proceed autonomously.
The pipeline is BLOCKED until the human runs `/squad:approve discovery`.
---

---
⚠️ MANDATORY HUMAN CHECKPOINT — PIPELINE PAUSED AFTER PHASE 2b (Architecture)
The MCP tool `request_approval` has set gate 'plan' to PENDING.
Present BOTH artifacts to the user for review:
  - Technical Analysis: `docs/pages/{{args}}-analysis.md`
  - Architecture/ADR: `docs/pages/{{args}}-architecture.md`
WAIT for their explicit written approval before calling any further agents.
Do NOT auto-approve. Do NOT proceed autonomously. Do NOT call any Developer agent or Compliance agent.
The pipeline is BLOCKED until the human runs `/squad:approve plan`.
---

### Phase 3 — Compliance Audit (Conditional)
**FIRST**, verify approval exists by calling:
```
agent_hub:check_gate(gate="plan")
```
If the gate is not approved, STOP IMMEDIATELY and inform the user that `/squad:approve plan` must be run first.

(Proceed ONLY after check_gate returns approved:true for 'plan'.)

**Evaluate compliance trigger BEFORE calling any agent.** Compliance is required if the feature handles any of: PII, Financial Data, Account/Auth Logic, or targets GDPR/LGPD/HIPAA regions.

- **If compliance IS required:**
  - Call `agent_hub:call_agent_command(agent="compliance", command="master", args="{{args}}")`.
  - Adopt the Privacy Auditor persona, conduct the compliance audit, and present the Audit Report to the user.
  - **AFTER presenting the audit**, call:
    ```
    agent_hub:request_approval(
      gate="compliance",
      artifact_path="docs/pages/{{args}}-audit.md",
      summary="Compliance audit completed. Please review the audit report and approve to proceed to execution."
    )
    ```
  - Wait for `/squad:approve compliance`.

- **If compliance is NOT required:**
  - Call `agent_hub:request_approval(gate="compliance", summary="Compliance phase skipped — feature does not require regulatory audit.")` directly. Do NOT call the compliance agent.
  - Inform the user and wait for acknowledgment via `/squad:approve compliance`.

---
⚠️ MANDATORY HUMAN CHECKPOINT — PIPELINE PAUSED AFTER PHASE 3 (if triggered)
The MCP tool `request_approval` has set gate 'compliance' to PENDING.
Present the Compliance Audit Report to the user and WAIT for their explicit written approval before calling any further agents.
Do NOT auto-approve. Do NOT proceed autonomously. Do NOT call any Developer agent.
The pipeline is BLOCKED until the human runs `/squad:approve compliance`.
---

### Phase 4 — Execution (Developer Agent)
**FIRST**, verify approval exists by calling:
```
agent_hub:check_gate(gate="compliance")
```
If the gate is not approved, STOP IMMEDIATELY.

(Proceed ONLY after the human has explicitly approved all prior applicable phases.)
- Determine the target tech stack from the Implementation Plan (`docs/pages/{{args}}-architecture.md`).
- Call `agent_hub:call_agent_command(agent="backend|frontend|mobile", command="squad-create", args="{{args}}")` as appropriate.
- Adopt the selected developer persona. The developer will:
  1. Read the approved PRD (`docs/pages/{{args}}-prd.md`) and the Architect's Implementation Plan (`docs/pages/{{args}}-architecture.md`).
  2. Implement unit and integration tests **first** before writing the production logic (TDD), ensuring 100% test coverage.
  3. Implement production code to pass the tests.
  4. Run tests and ensure a 100% pass rate.
  5. **Update Documentation:** Update Logseq pages, technical specifications, and API docs.
  6. **Ask for branch name approval** — suggest `feature/{{args}}`, wait for explicit human confirmation or a custom name.
  7. **Commit** all code and documentation to the confirmed branch using Conventional Commit guidelines.
  8. **Push to Origin:** Push the confirmed branch to origin (`git push origin <branch-name>`).
  9. Hand over to peer review.

  ⚠️ **CRITICAL:** In agent-hub developer runs, you MUST treat "implementation complete" as incomplete until these are also done:
  - docs updated
  - branch name proposed
  - user confirms branch
  - commit created
  - branch pushed to origin

### Phase 4.5 — Peer Code Review, Fix Loop & Push to Origin
- Call a second developer agent of the same technology stack as a Peer Reviewer:
  `agent_hub:call_agent_command(agent="backend|frontend|mobile", command="squad-review", args="{{args}}")`
- Adopt the Peer Reviewer persona and perform a local code review on the committed branch:
  1. Use the `sonarqube` MCP server's `issues` tool to check for static analysis issues, code smells, vulnerabilities, or bugs on modified components.
  2. Evaluate code quality, conventional commit guidelines, and ensure all tests are fully passing.
  3. **Audit Loop & Reversal:** If any critical or high findings or open SonarQube issues are found, the reviewer outputs a verdict of `REQUEST CHANGES` with detailed findings. The orchestrator **MUST revert** to the developer agent (Phase 4) to fix the issues. The developer applies fixes, re-commits to the same branch, and Phase 4.5 repeats.
  4. **Push to Origin:** Once the verdict is `APPROVE`, the reviewer pushes the branch to origin (`git push origin <branch-name>`).
  5. After the push, call:
     ```
     agent_hub:request_approval(
       gate="execution",
       summary="Code implementation and peer review completed successfully. Tests passed, SonarQube checks are clean, and changes pushed to feature branch."
     )
     ```

### Phase 5 — Synthesis & Export (Optional)
- If requested by the human or stakeholders, call `agent_hub:call_agent_command(agent="decoder", command="export", args="{{args}}")` for stakeholder reporting.

---

## Execution
Begin with `pipeline_start`, then Phase 1 for the goal: {{args}}

"""
