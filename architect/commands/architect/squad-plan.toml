description = "Architect Plan (Squad Flow): Take the PRD file and draft an implementation plan/ADR using the Logseq Knowledge Graph."

prompt = """
# Persona: Systems Architect
!{cat architect/brain/persona.md}

# Skills: Logseq Knowledge
!{cat common/skills/logseq_knowledge.md}

# Knowledge Base: ROI Logic
!{cat architect/knowledge/roi_logic.md}

# Probes
## MCP Server Availability
!{gemini mcp list}

# Squad Flow Task
Goal: {{args}}
Mode: [MODE: SQUAD-FLOW]

## Execution Instructions:
1. Initialize as the **Systems Architect**.
2. **Phase 0: Pre-Sync.** Verify current Logseq documentation in `docs/pages/`.
3. **Phase 1: Technical Analysis.** 
    - **Read the Logseq PRD:** Locate and read `docs/pages/{{args}}-prd.md`.
    - **Design Alignment:** If `stitch` is available, analyze design artifacts via `get_screen_code` to ensure architectural abstractions match UI/UX intent.
    - **Codebase Mapping:** Map codebase, data flows, and dependencies relative to the PRD requirements.
    - **Conflict Detection:** Identify any technical conflicts.
    - **Write findings to `docs/pages/{{args}}-analysis.md`** using standard Logseq properties:
      - `type:: [[Analysis]]`
      - `status:: [[ACTIVE]]`
      - `project:: [[tech-agents]]`
      and format using strict outliner bullet syntax (`- ` and spaces).
    - **Gate 0 — MCP Structural Enforcement:** Call `tech_agents:request_approval(gate="discovery", artifact_path="docs/pages/{{args}}-analysis.md", summary="Discovery/analysis phase complete. Architecture decision records are ready for review.")` THEN halt.
4. **Phase 2: Architectural Intent.**
    - **Write ADR:** Generate Architecture Decision Records in `docs/pages/{{args}}-architecture.md` using the template at `common/templates/logseq/architecture.md`.
    - **Logseq Header Mandate:** Must start with standard Logseq properties:
      - `type:: [[Plan]]`
      - `status:: [[ACTIVE]]`
      - `project:: [[tech-agents]]`
      prefixed with `- ` and bulleted.
    - **Context7 Citation Mandate:** If the plan involves external libraries/APIs, query the `context7` MCP server to fetch up-to-date documentation. Embed these fetched code blocks directly into a dedicated section of the plan called `## Dependency & API Contracts (Context7)`.
    - **Linking:** Ensure each decision links back to `[[{{args}}-prd]]`.
    - **Gate 1 — MCP Structural Enforcement:** Call `tech_agents:check_gate(gate="discovery")` FIRST. Then call `tech_agents:request_approval(gate="plan", artifact_path="docs/pages/{{args}}-architecture.md", summary="Architecture plan complete. Ready for implementation approval.")` and halt.

Ensure every approval gate is respected and the Logseq graph is enriched.
"""
