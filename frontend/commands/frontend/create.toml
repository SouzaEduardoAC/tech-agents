description = "Frontend Create: Complete end-to-end lifecycle (Investigation -> Plan -> Implementation -> Review) using Logseq Knowledge Graph."

prompt = """
# Persona: Senior Frontend Engineer
!{cat frontend/brain/persona.md}

# Skills: Logseq Knowledge
!{cat common/skills/logseq_knowledge.md}

# Skills: Senior Reviewer
!{cat frontend/skills/reviewer.md}

# Knowledge Base: ROI Logic
!{cat frontend/knowledge/roi_logic.md}

# Probes
## MCP Server Availability
!{gemini mcp list}

# Standalone Flow Task
Goal: {{args}}
Mode: [MODE: SQUAD-FLOW]

## Execution Instructions:
1. Initialize as the **Senior Frontend Engineer**.
2. **Phase 0: Pre-Sync.** Verify current Logseq documentation in `docs/pages/`.
3. **Phase 1: Technical Analysis.**
    - **Read the Logseq PRD:** Locate and read `docs/pages/{{args}}-prd.md`.
    - **Design Extraction:** If a design tool (e.g. Stitch, Figma) is available, use it to fetch the visual specification for this feature.
    - **Codebase Mapping:** Map components, state flows, and UI dependencies.
    - **Write findings to `docs/pages/{{args}}-analysis.md`** using standard Logseq properties:
      - `type:: [[Analysis]]`
      - `status:: [[ACTIVE]]`
      - `project:: [[tech-agents]]`
      prefixed with `- ` and bulleted.
    - **Gate 0 — MCP Structural Enforcement:** Call `tech_agents:request_approval(gate="discovery", artifact_path="docs/pages/{{args}}-analysis.md", summary="Frontend discovery/analysis phase complete. Component architecture and UI dependencies are ready for review.")` THEN halt.
4. **Phase 2: Architectural Intent.**
    - **Write ADR:** Generate Architecture Decision Records in `docs/pages/{{args}}-architecture.md`.
    - **Logseq Header Mandate:** Must start with standard Logseq properties:
      - `type:: [[Plan]]`
      - `status:: [[ACTIVE]]`
      - `project:: [[tech-agents]]`
      prefixed with `- ` and bulleted.
    - **Context7 Citation Mandate:** If external packages/libraries are involved, query the `context7` MCP server and embed API contracts under `## Dependency & API Contracts (Context7)`.
    - **Gate 1 — MCP Structural Enforcement:** Call `tech_agents:request_approval(gate="plan", artifact_path="docs/pages/{{args}}-architecture.md", summary="Frontend architecture plan complete. Ready for implementation approval.")` THEN halt.
5. **Phase 3: Execution (TDD).** Implement UI components and logic.
    - **Gate 1 check:** Call `tech_agents:check_gate(gate="plan")` — if blocked, stop.
    - **Package Restore Check:** Check manifests for private registries; if found, request nuget.config/npmrc config files.
    - Write unit/integration tests first. Implement production code. Ensure 100% test pass rate.
    - **Visual Verification (UI Only):** If a browser automation tool (e.g. Playwright) is available, run snapshot verifications.
6. **Phase 4: Audit.** Generate report in `docs/pages/{{args}}-audit.md` (started with Logseq properties).
7. **Phase 5: Post-Sync.** Update `docs/journals/` and `docs/pages/business-rules.md`.
8. **Closure.** Summarize results.
"""
