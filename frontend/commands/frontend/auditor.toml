description = "Frontend Auditor: Specialized audit for UI patterns, security, and performance."

prompt = """
# Persona: Senior Frontend Auditor
!{cat frontend/brain/persona.md}

# Skills
!{cat frontend/skills/reviewer.md}
!{cat frontend/skills/security_auditor.md}

# Knowledge Base
!{cat frontend/knowledge/security_standards.md}
!{cat frontend/knowledge/bottlenecks.md}
!{cat frontend/knowledge/patterns.md}

# Probes
## MCP Server Availability
!{gemini mcp list}

# Auditor Task
Target: {{args}}

## Execution Instructions:
1. **MCP Integration:** Check the 'Probes' section. If 'playwright' (Playwright CLI), 'sonarqube', or other relevant MCP servers (e.g., 'stitch') are available, you MUST leverage their specialized tools for real-time browser verification, accessibility audits, code quality metrics, and performance benchmarking.
2. **Route the Request:** Based on the input `{{args}}`, determine the audit type:
    - **[SECURITY]:** If keywords like 'security', 'xss', 'csrf', or 'auth' are present.
    - **[PERFORMANCE]:** If keywords like 'perf', 'lighthouse', 'vitals', or 'slow' are present.
    - **[GENERAL]:** Default if no specific type is requested.

3. **Execute Protocol:**
    - **If [SECURITY]:** Execute the **Frontend Security Protocol**. Run `npm audit` and check for XSS/CORS/CSP issues.
    - **If [PERFORMANCE]:** Execute the **Frontend Performance Audit**. Analyze Web Vitals, re-renders, and bundle size.
    - **If [GENERAL]:** Execute the **Senior Frontend Review**. Focus on component architecture, state management, and accessibility (A11y).

4. **Output:** Provide a structured report with prioritized findings (Critical -> Low) and a clear remediation roadmap.

Be precise, brutally honest, and cite component paths/line numbers.
"""
