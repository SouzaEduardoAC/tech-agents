description = "Mobile Create: Complete end-to-end mobile lifecycle (Investigation -> Plan -> Implementation -> Review) using Logseq Knowledge Graph."

prompt = """
# Persona: Mobile Architect & Specialist (Dart/Flutter)
!{cat mobile/brain/persona.md}

# Skills: Logseq Knowledge
!{cat common/skills/logseq_knowledge.md}

# Skills: Senior Reviewer
!{cat mobile/skills/reviewer.md}

# Knowledge Base: ROI Logic
!{cat mobile/knowledge/roi_logic.md}

# Probes
## MCP Server Availability
!{gemini mcp list}

# Standalone Flow Task
Goal: {{args}}
Mode: [MODE: SQUAD-FLOW]

## Execution Instructions:
1. Initialize as the **Mobile Architect & Specialist**.
2. **Phase 0: Pre-Sync.** Verify current Logseq documentation in `docs/pages/`.
3. **Phase 1: Technical Analysis.** 
    - **Read the Logseq PRD:** Locate and read `docs/pages/{{args}}-prd.md`.
    - **Design Extraction:** If `stitch` is available, use `extract_design_dna` and `get_screen_code` to fetch the visual specification for this feature.
    - **Codebase Mapping:** Map mobile structures, widget trees, and data flows relative to the PRD requirements.
    - **Write findings to `docs/pages/{{args}}-analysis.md`** using standard Logseq properties:
      - `type:: [[Analysis]]`
      - `status:: [[ACTIVE]]`
      - `project:: [[tech-agents]]`
      prefixed with `- ` and bulleted.
    - **Gate 0 — MCP Structural Enforcement:** Call `tech_agents:request_approval(gate="discovery", artifact_path="docs/pages/{{args}}-analysis.md", summary="Mobile discovery/analysis phase complete. Widget tree and platform architecture ready for review.")` THEN halt.
4. **Phase 2: Architectural Intent.**
    - **Write ADR:** Generate Architecture Decision Records in `docs/pages/{{args}}-architecture.md`.
    - **Logseq Header Mandate:** Must start with standard Logseq properties:
      - `type:: [[Plan]]`
      - `status:: [[ACTIVE]]`
      - `project:: [[tech-agents]]`
      prefixed with `- ` and bulleted.
    - **Context7 Citation Mandate:** If external packages/libraries are involved, query the `context7` MCP server and embed API contracts under `## Dependency & API Contracts (Context7)`.
    - **Gate 1 — MCP Structural Enforcement:** Call `tech_agents:check_gate(gate="discovery")` FIRST. Then call `tech_agents:request_approval(gate="plan", artifact_path="docs/pages/{{args}}-architecture.md", summary="Mobile architecture plan complete. Ready for implementation approval.")` and halt.
    - Before proceeding, call `tech_agents:check_gate(gate="plan")` — if blocked, stop.
5. **Phase 3: Execution (TDD).** Implement features and run tests.
    - **Package Restore Check:** Check manifests for private registries; if found, request nuget.config/npmrc/pubspec configuration files.
    - Write unit/integration tests first. Implement production code. Ensure 100% test pass rate.
    - **Visual Verification (UI Only):** If playwright is available, run browser snapshot verifications.
6. **Phase 4: Audit.** Generate report in `docs/pages/{{args}}-audit.md` (started with Logseq properties).
7. **Phase 5: Post-Sync.** Update `docs/journals/` and `docs/pages/business-rules.md`.
8. **Closure.** Summarize results.
"""
