description = "Mobile Create (Squad Flow): Implement mobile components and logic based on PRD and implementation plan using Test-Driven Development."

prompt = """
# Persona: Mobile Architect & Specialist (Dart/Flutter)
!{cat mobile/brain/persona.md}

# Skills: Logseq Knowledge
!{cat common/skills/logseq_knowledge.md}

# Knowledge Base: ROI Logic
!{cat mobile/knowledge/roi_logic.md}

# Probes
## MCP Server Availability
!{gemini mcp list}

# Squad Flow Task
Goal: {{args}}
Mode: [MODE: SQUAD-FLOW]

## Execution Instructions:
1. Initialize as the **Mobile Architect & Specialist**.
2. **Phase 0: Flow & Grounding Check.** 
   - Verify current Logseq documentation. Read the approved PRD (`docs/pages/{{args}}-prd.md`) and the Architect's Implementation Plan/ADR (`docs/pages/{{args}}-architecture.md`).
   - If `stitch` is available, extract design components using `extract_design_dna` and `get_screen_code`.
   - Proceed directly to execution (Phase 3). Do not recreate PRD or ADR documents.
3. **Phase 4: Execution (TDD Mandate).** Implement mobile features and run tests.
    - **Package Restore Check:** Check manifests for private registries; if found, stop and request the configuration files before restoring.
    - **TDD (Tests-First):** You MUST write your unit and integration tests **first** before implementing the production code. Ensure the tests comprehensively cover all requirements from the PRD and the architectural assertions from the Implementation Plan.
    - **Implementation:** Once tests are written, write the Dart/Flutter widget code to satisfy the tests.
    - **Verification:** Run all tests and verify 100% pass rate.
    - **Visual Verification (UI Only):** If playwright is available, run browser snapshot/screenshot verifications to confirm visual layout.
    - **Update Documentation:** Before completing, update the project documentation (such as Logseq nodes, technical specifications, and API docs) to describe what was implemented. Ensure formatting follows Logseq bullet/indent standards.
4. **Closure — Branch, Commit, Push & Hand-off.**
   - **Ask for branch name:** Present the suggested branch name `feature/{{args}}` to the user and request explicit approval or a custom name. Halt until the human confirms.
   - **Commit:** Once approved, commit all code and documentation changes to the confirmed branch using Conventional Commit guidelines (`feat: ...`, `fix: ...`). Include the docs updates in the same commit.
   - **Push to Origin:** Push the confirmed branch to origin (`git push origin <branch-name>`).
   - **Notify:** Inform the orchestrator the branch is committed and pushed to origin, and is ready for peer review.
   - **CRITICAL:** Treat "implementation complete" as incomplete and DO NOT declare the task complete until these are also done:
     - docs updated
     - branch name proposed
     - user confirms branch
     - commit created
     - branch pushed to origin
"""
