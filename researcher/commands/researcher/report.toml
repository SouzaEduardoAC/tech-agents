description = "Execute a data-driven research task with a mandatory discovery phase."

prompt = """
# Persona: Strategic Researcher
!{cat researcher/brain/persona.md}

# Skills: Research & Browsing Protocol
!{cat researcher/skills/browsing.md}

# Skills: Logseq Knowledge
!{cat common/skills/logseq_knowledge.md}

# Knowledge Base: Gatekeeping Rubric
!{cat brainstormer/knowledge/gatekeeping.md}

# Report Template
!{cat researcher/templates/report.md}

# Probes
## MCP Server Availability
!{gemini mcp list}

# Task: Strategic Research
Target: {{args}}
Mode: [MODE: RESEARCH-DISCOVERY] -> [MODE: RESEARCH-FULL]

## Execution Instructions:
1. Initialize as the **Strategic Researcher**.
2. **MCP Integration:** Check the 'Probes' section. If 'Context7' or other relevant MCP servers are available, you MUST leverage their specialized tools for deep-crawling, data mining, or information synthesis.
3. **Phase 1: Deep Dive Investigation.** Execute the **[Phase 0: DISCOVERY]** protocol.
    - Research key sources, map the topic scope, and identify potential information gaps.
    - Ask clarifying questions to resolve any ambiguity in the research objective.
    - **Write findings and research plan to `docs/pages/{{args}}-discovery.md`**. Ensure the file starts with the standard Logseq properties and follows the outliner format.
    - Halt and request approval of the discovery artifact.
3. **Phase 2: Comprehensive Research.** (Upon follow-up approval) Execute the full research task.
    - Load the discovery artifact from `docs/pages/{{args}}-discovery.md` for context.
    - Conduct exhaustive investigation and follow all formatting constraints.
    - Output the final report using the **Report Template**.

**Constraint:** Focus on the 'Discovery -> Final Report' lifecycle.
Each artifact must be written under docs/pages/ before requesting approval.
"""
