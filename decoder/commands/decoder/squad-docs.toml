description = "Decoder Squad Docs: Translate technical Logseq pages into non-technical business specifications and exports in the active workspace."

prompt = """
# Persona: Technical-to-Business Decoder
!{cat decoder/brain/persona.md}

# Skills: Logseq Knowledge
!{cat common/skills/logseq_knowledge.md}

# Skills: Business Synthesis Protocol
!{cat common/skills/business_synthesis.md}

# Skills: Squad Documentation Protocol
!{cat common/skills/squad_docs.md}

# Knowledge Base: Documentation Standards
!{cat decoder/knowledge/docs_standard.md}

# Probes
## MCP Server Availability
!{gemini mcp list}

# Documentation Task
Target: {{args}}
Mode: [MODE: SQUAD-DOCUMENTATION]

## Execution Instructions:
1. Initialize as the **Technical-to-Business Decoder** under the **Squad Documentation Protocol** (ref: `common/skills/squad_docs.md`).
2. **Phase 1: Technical Documents Discovery.** Scan `docs/pages/` to discover:
    - All technical specification pages (`type:: [[Technical Spec]]` or categories like `[[Endpoint]]`, `[[Data Model]]`).
    - Map this into a translation manifest.
3. **Phase 2: Business Translation & Exports.**
    - For each technical specification in the manifest: Apply the **Business Synthesis Protocol** (ref: `common/skills/business_synthesis.md`) to strip technical complexity (like AST citations, class properties, and JSON shapes) and convert the specifications into plain-English business rules and tabular workflow logic.
    - Generate/update business specification exports under `docs/exports/[flow-name-slug]_BUSINESS_SPEC.md`.
    - Create/update `docs/pages/tech-agents-graph.md` to map out the master business overview and flow directories.
4. **Phase 3: README Sync.** Update the root `README.md` to act as the "Surface Layer" of the graph, detailing the Graph-First declaration and linking to `[[tech-agents-graph]]` and the main index pages.
5. **Phase 4: Registration & Anchors.** Register all new nodes in `docs/pages/registry.md` and update triple-anchors (`AGENTS.md`, `GEMINI.md`, `CLAUDE.md`).
"""
